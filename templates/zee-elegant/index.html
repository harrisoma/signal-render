<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zee Elegant Template</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1080px; overflow:hidden; }
  body { font-family:'Jost',system-ui,sans-serif; }

  :root{
    --bg:#F7F3EE;           /* warm cream */
    --card:#FFFFFF;          /* clean white card */
    --lav:#B79CE0;           /* lavender signature */
    --lav-deep:#8A6FB8;      /* deeper lavender for text accents */
    --ink:#2A2530;           /* soft black for body text */
    --muted:#9B93A3;         /* muted lavender-grey */
    --line:#E6DFF2;          /* faint lavender hairline */
  }

  .canvas{ position:relative; width:1080px; height:1080px; background:var(--bg); overflow:hidden; }

  /* subtle botanical corner flourishes drawn in CSS (soft, not dominant) */
  .flourish{ position:absolute; border-radius:50%;
    background:radial-gradient(circle, rgba(183,156,224,0.22) 0%, transparent 70%); filter:blur(20px); }
  .flourish.tl{ width:420px;height:420px; top:-160px; left:-160px; }
  .flourish.br{ width:480px;height:480px; bottom:-180px; right:-180px;
    background:radial-gradient(circle, rgba(232,214,196,0.35) 0%, transparent 70%); }

  /* thin lavender frame inset — editorial elegance */
  .frame{ position:absolute; inset:64px; border:1px solid var(--lav);
    border-radius:6px; opacity:.55; }
  .frame::before{ content:""; position:absolute; inset:10px; border:1px solid var(--line); border-radius:3px; }

  .inner{ position:absolute; inset:64px; display:flex; flex-direction:column;
    align-items:center; text-align:center; padding:92px 96px; }

  /* header: logo centered, optional white pill (Zee's logo is on transparent, cream bg is light so pill optional) */
  .logo-wrap{ display:inline-flex; align-items:center; justify-content:center; border-radius:16px; margin-bottom:8px; }
  .logo-wrap.pill{ background:#FFFFFF; padding:14px 20px; box-shadow:0 6px 24px rgba(138,111,184,0.12); }
  .logo-wrap img{ height:96px; width:auto; display:block; }
  .wordmark{ font-family:'Cormorant Garamond',serif; font-weight:600; font-size:58px;
    letter-spacing:2px; color:var(--lav-deep); }

  /* eyebrow: letter-spaced small caps label with flanking rules */
  .eyebrow{ display:flex; align-items:center; gap:18px; margin-top:44px;
    font-family:'Jost',sans-serif; font-weight:500; font-size:20px; letter-spacing:5px;
    text-transform:uppercase; color:var(--lav-deep); }
  .eyebrow::before, .eyebrow::after{ content:""; width:46px; height:1px; background:var(--lav); }
  .eyebrow:empty{ display:none; }

  /* headline: elegant serif, large, with an italic accent option */
  .headline{ font-family:'Cormorant Garamond',serif; font-weight:500; font-size:88px;
    line-height:1.06; color:var(--ink); margin-top:40px; max-width:15ch; }
  .headline .accent{ font-style:italic; color:var(--lav-deep); }

  /* body: clean sans, airy */
  .body{ font-family:'Jost',sans-serif; font-weight:300; font-size:30px; line-height:1.6;
    color:var(--ink); margin-top:38px; max-width:80%; }
  .body:empty{ display:none; }

  /* divider dot */
  .dot{ width:8px; height:8px; border-radius:50%; background:var(--lav); margin:44px auto 0; }

  /* footer: contact, pushed to bottom */
  .footer{ margin-top:auto; display:flex; flex-direction:column; align-items:center; gap:10px; }
  .contact{ font-family:'Jost',sans-serif; font-weight:400; font-size:24px; letter-spacing:1px; color:var(--ink); }
  .contact:empty{ display:none; }
  .tagline{ font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:400;
    font-size:26px; color:var(--muted); }
  .tagline:empty{ display:none; }
</style>
</head>
<body>
  <div class="canvas">
    <div class="flourish tl"></div>
    <div class="flourish br"></div>
    <div class="frame"></div>
    <div class="inner">
      <div class="logo-wrap" id="logoWrap">
        <img id="logo" alt="" style="display:none">
        <span class="wordmark" id="wordmark"></span>
      </div>
      <div class="eyebrow" id="eyebrow"></div>
      <h1 class="headline" id="headline"></h1>
      <p class="body" id="body"></p>
      <div class="dot"></div>
      <div class="footer">
        <div class="contact" id="contact"></div>
        <div class="tagline" id="tagline"></div>
      </div>
    </div>
  </div>

<script>
  const q = new URLSearchParams(location.search);
  const g = (k, d='') => q.get(k) ?? d;
  const root = document.documentElement.style;

  // theme overrides (optional per-post)
  if (q.get('bg'))       root.setProperty('--bg', '#'+g('bg').replace(/^#/,''));
  if (q.get('lav'))      root.setProperty('--lav', '#'+g('lav').replace(/^#/,''));
  if (q.get('accentFrom'))root.setProperty('--lav', '#'+g('accentFrom').replace(/^#/,''));
  if (q.get('accentTo'))  root.setProperty('--lav-deep', '#'+g('accentTo').replace(/^#/,''));

  // async image loading with fail tracking (same reliability contract as other templates)
  const imgWaits = [];
  const imgStatus = { logo: 'none' };
  const logoUrl = g('logo');
  if (logoUrl) {
    const el = document.getElementById('logo');
    el.style.display = 'block';
    imgStatus.logo = 'loading';
    imgWaits.push(new Promise((resolve) => {
      el.onload  = () => { imgStatus.logo = (el.naturalWidth > 0) ? 'ok' : 'fail'; resolve(); };
      el.onerror = () => { imgStatus.logo = 'fail'; resolve(); };
      el.src = logoUrl;
    }));
  } else {
    document.getElementById('wordmark').textContent = g('brand','');
  }
  if (g('pill')==='1' || g('pill')==='white') document.getElementById('logoWrap').classList.add('pill');

  document.getElementById('eyebrow').textContent = g('eyebrow');
  // headline: *word* becomes italic lavender accent
  const hl = g('headline');
  document.getElementById('headline').innerHTML =
    hl.replace(/\*(.+?)\*/g, '<span class="accent">$1</span>');
  document.getElementById('body').textContent = g('body');
  document.getElementById('contact').textContent = g('contact', g('url',''));
  document.getElementById('tagline').textContent = g('tagline','');

  const fontsReady = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
  Promise.all([fontsReady, ...imgWaits]).then(() => {
    document.body.dataset.imgStatus = JSON.stringify(imgStatus);
    document.body.dataset.ready = '1';
  });
</script>
</body>
</html>
