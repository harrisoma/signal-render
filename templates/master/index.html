<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Master Template</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1080px; overflow:hidden; }
  body { font-family:'Inter',system-ui,sans-serif; }

  /* Defaults are Onixus; every one is overridden by ?param= via JS below */
  :root{
    --bg:#050505;
    --accent-from:#9945FF;
    --accent-to:#14F195;
    --accent-solid:#14F195;
    --text:#FFFFFF;
    --muted:#A6A6B2;
    --card-from:rgba(28,24,48,0.55);
    --card-to:rgba(10,10,16,0.66);
    --glow:#8B5CF6;
    --pill-bg:transparent;   /* set to #FFFFFF for white-pill brands */
    --pill-on:0;             /* 1 = draw white pill behind logo */
  }

  .canvas{ position:relative; width:1080px; height:1080px; background:var(--bg); overflow:hidden; }
  .canvas::before{ content:""; position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size:120px 120px; }
  .glow{ position:absolute; border-radius:50%; filter:blur(90px); pointer-events:none; }
  .glow.tr{ width:520px;height:520px; top:-180px; right:-160px;
    background:radial-gradient(circle,var(--glow) 0%, transparent 70%); opacity:.8; }
  .glow.bl{ width:480px;height:480px; bottom:-180px; left:-170px;
    background:radial-gradient(circle,var(--glow) 0%, transparent 70%); opacity:.65; }

  .card{ position:absolute; inset:80px; border-radius:56px;
    background:linear-gradient(155deg,var(--card-from) 0%, var(--card-to) 100%);
    border:1px solid rgba(255,255,255,0.07);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.06), 0 40px 100px rgba(0,0,0,0.55);
    padding:70px 72px; display:flex; flex-direction:column; }

  .header{ display:flex; align-items:flex-start; justify-content:space-between; min-height:64px; }
  /* logo slot: optional white pill backdrop */
  .logo-wrap{ display:inline-flex; align-items:center; border-radius:20px; padding:0; }
  .logo-wrap.pill{ background:#FFFFFF; padding:14px 18px; }
  .logo-wrap img{ height:52px; width:auto; display:block; }
  .logo-wrap.pill img{ height:46px; }
  /* fallback wordmark if no logo url */
  .wordmark{ font-weight:800; font-size:40px; letter-spacing:6px; color:var(--text); }
  .product-logo img{ height:44px; width:auto; display:block; }
  .dots{ display:flex; gap:9px; margin-top:8px; }
  .dots span{ width:11px;height:11px;border-radius:50%; }
  .dots span:nth-child(1){ background:var(--accent-solid); }
  .dots span:nth-child(2){ background:var(--accent-from); }
  .dots span:nth-child(3){ background:var(--glow); }

  .content{ margin-top:60px; flex:1; display:flex; flex-direction:column; }
  .eyebrow{ display:inline-flex; align-self:flex-start; font-weight:600; font-size:19px;
    letter-spacing:3px; text-transform:uppercase; color:var(--accent-solid);
    padding:9px 18px; border:1px solid var(--accent-solid); border-radius:999px;
    background:color-mix(in srgb, var(--accent-solid) 8%, transparent); }
  .eyebrow:empty{ display:none; }
  .headline{ margin-top:36px; font-weight:800; font-size:72px; line-height:1.08;
    letter-spacing:-1px; color:var(--text); max-width:16ch; }
  .headline .accent{ color:var(--accent-solid); }
  .bodyrow{ margin-top:30px; display:flex; gap:24px; max-width:82%; }
  .bodyrow .rule{ width:3px; flex:none; border-radius:2px;
    background:linear-gradient(180deg,var(--accent-from),var(--accent-to)); }
  .bodyrow p{ color:#E7E7EF; font-weight:400; font-size:29px; line-height:1.5; }
  .bodyrow:has(p:empty){ display:none; }

  .stat{ margin-top:auto; display:flex; align-items:baseline; gap:18px; }
  .stat:has(.num:empty){ display:none; }
  .stat .num{ font-weight:800; font-size:64px;
    background:linear-gradient(90deg,var(--accent-from),var(--accent-to));
    -webkit-background-clip:text; background-clip:text; color:transparent; }
  .stat .lbl{ font-weight:500; font-size:23px; color:var(--muted); max-width:15ch; line-height:1.25; }

  .footer{ margin-top:52px; display:flex; align-items:center; justify-content:space-between; }
  .foot-left{ display:flex; flex-direction:column; gap:6px; }
  .url{ display:flex; align-items:center; gap:12px; color:var(--text); font-weight:700; font-size:22px; }
  .url:empty{ display:none; }
  .url .globe{ width:19px;height:19px;border-radius:50%;border:1.8px solid var(--text); position:relative; flex:none; }
  .url .globe::before{ content:""; position:absolute; inset:-1.8px 4.5px; border:1.8px solid var(--text); border-radius:50%; }
  .powered{ font-weight:500; font-size:17px; color:var(--muted); letter-spacing:.3px; padding-left:31px; }
  .powered:empty{ display:none; }
  .powered b{ color:var(--glow); font-weight:700; }
  .cta{ width:64px;height:64px;border-radius:50%; border:1.8px solid var(--accent-solid);
    display:flex; align-items:center; justify-content:center; flex:none; }
  .cta svg{ width:26px;height:26px; }
</style>
</head>
<body>
  <div class="canvas">
    <div class="glow tr"></div>
    <div class="glow bl"></div>
    <div class="card">
      <div class="header">
        <div class="logo-wrap" id="logoWrap">
          <img id="logo" alt="" style="display:none">
          <span class="wordmark" id="wordmark"></span>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px">
          <div class="product-logo" id="productWrap" style="display:none"><img id="productLogo" alt=""></div>
          <div class="dots"><span></span><span></span><span></span></div>
        </div>
      </div>
      <div class="content">
        <span class="eyebrow" id="eyebrow"></span>
        <h1 class="headline" id="headline"></h1>
        <div class="bodyrow"><div class="rule"></div><p id="body"></p></div>
        <div class="stat"><span class="num" id="statNum"></span><span class="lbl" id="statLbl"></span></div>
      </div>
      <div class="footer">
        <div class="foot-left">
          <div class="url" id="url"></div>
          <div class="powered" id="powered"></div>
        </div>
        <div class="cta">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent-solid)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="7" y1="17" x2="17" y2="7"/><polyline points="8 7 17 7 17 16"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

<script>
  // ---- read all brand + content data from URL query params ----
  const q = new URLSearchParams(location.search);
  const g = (k, d='') => q.get(k) ?? d;
  const root = document.documentElement.style;

  // colors / theme
  if (q.get('bg'))        root.setProperty('--bg', '#'+g('bg').replace(/^#/,''));
  if (q.get('accentFrom'))root.setProperty('--accent-from', '#'+g('accentFrom').replace(/^#/,''));
  if (q.get('accentTo'))  root.setProperty('--accent-to', '#'+g('accentTo').replace(/^#/,''));
  // accent-solid: use explicit, else accentTo, else accentFrom
  const solid = g('accent', g('accentTo', g('accentFrom','')));
  if (solid) root.setProperty('--accent-solid', '#'+solid.replace(/^#/,''));
  if (q.get('glow'))      root.setProperty('--glow', '#'+g('glow').replace(/^#/,''));

  // ---- image loading is async; collect promises and only signal ready
  //      once every image has genuinely loaded OR failed. Record failures
  //      so the render service can treat a broken logo as a real error. ----
  const imgWaits = [];
  const imgStatus = { logo: 'none', productLogo: 'none' }; // none|ok|fail

  function loadImage(el, src, key) {
    imgStatus[key] = 'loading';
    imgWaits.push(new Promise((resolve) => {
      el.onload = () => {
        // naturalWidth 0 means it "loaded" but is broken/empty
        imgStatus[key] = (el.naturalWidth > 0) ? 'ok' : 'fail';
        resolve();
      };
      el.onerror = () => { imgStatus[key] = 'fail'; resolve(); };
      el.src = src;
    }));
  }

  // logo (top-left): url OR fallback wordmark text
  const logoUrl = g('logo');
  if (logoUrl) {
    const el = document.getElementById('logo');
    el.style.display = 'block';
    loadImage(el, logoUrl, 'logo');
  } else {
    document.getElementById('wordmark').textContent = g('brand','');
  }
  // white pill behind logo?
  if (g('pill') === '1' || g('pill') === 'white') {
    document.getElementById('logoWrap').classList.add('pill');
  }

  // product logo (top-right), optional
  const prod = g('productLogo');
  if (prod) {
    document.getElementById('productWrap').style.display='block';
    loadImage(document.getElementById('productLogo'), prod, 'productLogo');
  }

  // text content
  document.getElementById('eyebrow').textContent = g('eyebrow');
  // headline supports an *accent* segment via {{...}} markers
  const hl = g('headline');
  document.getElementById('headline').innerHTML =
    hl.replace(/\{\{(.+?)\}\}/g, '<span class="accent">$1</span>');
  document.getElementById('body').textContent = g('body');
  document.getElementById('statNum').textContent = g('statNum');
  document.getElementById('statLbl').textContent = g('statLbl');

  const url = g('url');
  if (url) document.getElementById('url').innerHTML = '<span class="globe"></span>'+url;
  const pw = g('powered');
  if (pw) document.getElementById('powered').innerHTML = pw.replace(/\*(.+?)\*/g,'<b>$1</b>');

  // Only signal ready after fonts + all images settle. Publish status for the service.
  const fontsReady = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
  Promise.all([fontsReady, ...imgWaits]).then(() => {
    document.body.dataset.imgStatus = JSON.stringify(imgStatus);
    document.body.dataset.ready = '1'; // render service waits on this
  });
</script>
</body>
</html>
